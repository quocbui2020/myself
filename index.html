<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quoc Bui - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header & Navigation */
        header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
            min-width: 300px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .header-info h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 5px;
        }

        .header-info p {
            color: #666;
            font-size: 14px;
        }

        .header-nav {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .nav-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .nav-btn.secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .nav-btn.secondary:hover {
            background: #f8f9ff;
        }

        /* Main Content */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .about-text {
            color: #555;
            font-size: 16px;
            line-height: 1.8;
        }

        /* Skills */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .skill-group {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .skill-group h3 {
            color: #667eea;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .skill-item {
            display: inline-block;
            background: white;
            padding: 6px 12px;
            margin: 4px 4px 4px 0;
            border-radius: 20px;
            border: 1px solid #667eea;
            color: #667eea;
            font-size: 12px;
            font-weight: 500;
        }

        /* Experience & Projects */
        .experience-item,
        .project-item,
        .education-item {
            background: #f8f9ff;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .experience-item h3,
        .project-item h3,
        .education-item h3 {
            color: #667eea;
            margin-bottom: 5px;
        }

        .meta {
            color: #999;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .description {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Contact & Links */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #666;
            font-size: 14px;
        }

        .contact-item strong {
            color: #667eea;
            min-width: 80px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }

            .header-left {
                flex-direction: column;
                width: 100%;
            }

            .header-info h1 {
                font-size: 24px;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .header-nav {
                justify-content: center;
                width: 100%;
            }

            .skills-grid {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }

            header {
                padding: 15px;
            }

            .card {
                padding: 15px;
            }

            .profile-pic {
                width: 80px;
                height: 80px;
            }

            .header-info h1 {
                font-size: 20px;
            }

            .nav-btn {
                padding: 8px 16px;
                font-size: 12px;
            }
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
            }

            .header-nav,
            .nav-btn {
                display: none;
            }

            .card {
                page-break-inside: avoid;
            }
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <img src="quoc.jpg" alt="Profile Picture" class="profile-pic" onerror="this.style.display='none'">
                <div class="header-info">
                    <h1 id="personName">Quoc Bui</h1>
                    <p id="personTitle">Full Stack Developer</p>
                </div>
            </div>
            <div class="header-nav">
                <a href="game.html" class="nav-btn">Play Game</a>
                <button class="nav-btn secondary" onclick="scrollToSection('resume')">Resume</button>
                <button class="nav-btn secondary" onclick="scrollToSection('contact')">Contact</button>
            </div>
        </header>

        <div class="content-grid">
            <div class="card">
                <h2>About Me</h2>
                <p class="about-text" id="aboutText">Loading...</p>
            </div>

            <div class="card" id="contact">
                <h2>Contact</h2>
                <div class="contact-info">
                    <div class="contact-item">
                        <strong>Email:</strong>
                        <span id="personEmail">-</span>
                    </div>
                    <div class="contact-item">
                        <strong>Phone:</strong>
                        <span id="personPhone">-</span>
                    </div>
                    <div class="contact-item">
                        <strong>Location:</strong>
                        <span id="personLocation">-</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Skills</h2>
            <div class="skills-grid" id="skillsContainer">
                <div class="empty-state">Loading skills...</div>
            </div>
        </div>

        <div class="card" id="resume">
            <h2>Experience</h2>
            <div id="experienceContainer">
                <div class="empty-state">Loading experience...</div>
            </div>
        </div>

        <div class="card">
            <h2>Projects</h2>
            <div id="projectsContainer">
                <div class="empty-state">Loading projects...</div>
            </div>
        </div>

        <div class="card">
            <h2>Education</h2>
            <div id="educationContainer">
                <div class="empty-state">Loading education...</div>
            </div>
        </div>
    </div>

    <script>
        // Load resume data from JSON
        async function loadResume() {
            try {
                const response = await fetch('resume.json');
                const data = await response.json();
                renderResume(data);
            } catch (error) {
                console.error('Error loading resume:', error);
            }
        }

        function renderResume(data) {
            // Personal info
            document.getElementById('personName').textContent = data.personal.name;
            document.getElementById('personTitle').textContent = data.personal.title;
            document.getElementById('aboutText').textContent = data.personal.about;
            document.getElementById('personEmail').textContent = data.personal.email;
            document.getElementById('personPhone').textContent = data.personal.phone;
            document.getElementById('personLocation').textContent = data.personal.location;

            // Skills
            const skillsContainer = document.getElementById('skillsContainer');
            skillsContainer.innerHTML = data.skills.map(skillGroup => `
                <div class="skill-group">
                    <h3>${skillGroup.category}</h3>
                    ${skillGroup.items.map(item => `<div class="skill-item">${item}</div>`).join('')}
                </div>
            `).join('');

            // Experience
            const experienceContainer = document.getElementById('experienceContainer');
            experienceContainer.innerHTML = data.experience.map(exp => `
                <div class="experience-item">
                    <h3>${exp.title}</h3>
                    <div class="meta">${exp.company} • ${exp.duration}</div>
                    <div class="description">${exp.description}</div>
                </div>
            `).join('') || '<div class="empty-state">No experience listed</div>';

            // Projects
            const projectsContainer = document.getElementById('projectsContainer');
            projectsContainer.innerHTML = data.projects.map(proj => `
                <div class="project-item">
                    <h3>${proj.name}</h3>
                    <div class="description">${proj.description}</div>
                </div>
            `).join('') || '<div class="empty-state">No projects listed</div>';

            // Education
            const educationContainer = document.getElementById('educationContainer');
            educationContainer.innerHTML = data.education.map(edu => `
                <div class="education-item">
                    <h3>${edu.degree}</h3>
                    <div class="meta">${edu.school} • ${edu.year}</div>
                    <div class="description">${edu.field}</div>
                </div>
            `).join('') || '<div class="empty-state">No education listed</div>';
        }

        function scrollToSection(sectionId) {
            const element = document.getElementById(sectionId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Load resume when page loads
        loadResume();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quoc Bui - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header & Navigation */
        header {
            background: white;
            border-radius: 12px;
            padding: 22px 30px;
            margin-bottom: 22px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            flex: 1;
            min-width: 260px;
        }

        .profile-pic {
            width: 100%;
            max-width: 100%;
            aspect-ratio: 1 / 1;
            height: auto;
            display: block;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid rgba(102, 126, 234, 0.45);
            box-shadow: 0 12px 26px rgba(50, 64, 145, 0.25);
        }

        .header-info h1 {
            font-size: 34px;
            color: #667eea;
            margin-bottom: 5px;
            line-height: 1.1;
        }

        .header-info p {
            color: #666;
            font-size: 17px;
            font-weight: 600;
        }

        .hero-layout {
            display: block;
            margin-bottom: 28px;
        }

        .hero-card {
            background: white;
            border-radius: 12px;
            padding: 22px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .hero-photo {
            flex: 0 0 40%;
            max-width: 40%;
            overflow: hidden;
        }

        .about-content {
            margin: 0;
            flex: 0 0 60%;
            max-width: 60%;
            min-width: 0;
        }

        .about-content h2 {
            color: #667eea;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .header-nav {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .nav-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .nav-btn.secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .nav-btn.secondary:hover {
            background: #f8f9ff;
        }

        /* Main Content */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .about-text {
            color: #555;
            font-size: 16px;
            line-height: 1.8;
        }

        /* Skills */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .skill-group {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .skill-group h3 {
            color: #667eea;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .skill-item {
            display: inline-block;
            background: white;
            padding: 6px 12px;
            margin: 4px 4px 4px 0;
            border-radius: 20px;
            border: 1px solid #667eea;
            color: #667eea;
            font-size: 12px;
            font-weight: 500;
        }

        /* Experience & Projects */
        .experience-item,
        .project-item,
        .education-item {
            background: #f8f9ff;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .experience-item h3,
        .project-item h3,
        .education-item h3 {
            color: #667eea;
            margin-bottom: 5px;
        }

        .meta {
            color: #999;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .description {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Contact & Links */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #666;
            font-size: 14px;
        }

        .contact-item strong {
            color: #667eea;
            min-width: 80px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }

            .header-left {
                align-items: center;
                width: 100%;
            }

            .header-info h1 {
                font-size: 24px;
            }

            .hero-layout {
                margin-bottom: 20px;
            }

            .hero-card {
                display: block;
                padding: 16px;
            }

            .hero-photo,
            .about-content {
                max-width: 100%;
            }

            .profile-pic {
                width: min(92vw, 62vh);
                height: min(92vw, 62vh);
                margin: 0 auto 14px;
                display: block;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .header-nav {
                justify-content: center;
                width: 100%;
            }

            .skills-grid {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }

            header {
                padding: 15px;
            }

            .card {
                padding: 15px;
            }

            .profile-pic {
                width: min(92vw, 52vh);
                height: min(92vw, 52vh);
            }

            .header-info h1 {
                font-size: 20px;
            }

            .nav-btn {
                padding: 8px 16px;
                font-size: 12px;
            }
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
            }

            .header-nav,
            .nav-btn {
                display: none;
            }

            .card {
                page-break-inside: avoid;
            }
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>

        <script>
        // Load resume data from JSON
                function getEmbeddedResumeData() {
                        const node = document.getElementById('embeddedResumeData');
                        if (!node) return null;
                        try {
                                return JSON.parse(node.textContent);
                        } catch (_) {
                                return null;
                        }
                }

        async function loadResume() {
            try {
                const response = await fetch(`resume.json?t=${Date.now()}`, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`Failed to load resume.json (${response.status})`);
                }
                const data = await response.json();
                renderResume(data);
            } catch (error) {
                                const embedded = getEmbeddedResumeData();
                                if (embedded) {
                                        renderResume(embedded);
                                        return;
                                }
                                console.error('Error loading resume:', error);
            }
        }

        function renderResume(data) {
            const personal = data.personal || {};
            const summary = data.summary || personal.about || 'No summary available.';
            const skills = Array.isArray(data.technicalSkills)
                ? data.technicalSkills.map((s) => ({ category: s.label, items: s.items || [] }))
                : Array.isArray(data.skills)
                ? data.skills.map((s) => ({ category: s.category, items: s.items || [] }))
                : [];

            const experiences = Array.isArray(data.workExperience)
                ? data.workExperience.map((exp) => ({
                    title: exp.title || '',
                    company: exp.company || '',
                    duration: exp.dateRange || '',
                    description: Array.isArray(exp.highlights) ? exp.highlights.join(' ') : (exp.description || '')
                }))
                : Array.isArray(data.experience)
                ? data.experience.map((exp) => ({
                    title: exp.title || '',
                    company: exp.company || '',
                    duration: exp.duration || '',
                    description: exp.description || ''
                }))
                : [];

            const projects = Array.isArray(data.projects) ? data.projects : [];

            const education = Array.isArray(data.education)
                ? data.education.map((edu) => ({
                    degree: edu.degree || '',
                    school: edu.institution || edu.school || '',
                    year: edu.dateRange || edu.year || '',
                    field: Array.isArray(edu.highlights) && edu.highlights.length
                        ? edu.highlights.join(' ')
                        : (edu.field || '')
                }))
                : [];

            // Personal info
            document.getElementById('personName').textContent = personal.name || 'N/A';
            document.getElementById('personTitle').textContent = personal.title || 'N/A';
            document.getElementById('aboutText').textContent = summary;
            document.getElementById('personEmail').textContent = personal.email || '-';
            const githubLink = document.getElementById('personGithub');
            const github = personal.github || '-';
            githubLink.textContent = github;
            githubLink.href = personal.github || '#';

            // Skills
            const skillsContainer = document.getElementById('skillsContainer');
            skillsContainer.innerHTML = skills.map(skillGroup => `
                <div class="skill-group">
                    <h3>${skillGroup.category}</h3>
                    ${(skillGroup.items || []).map(item => `<div class="skill-item">${item}</div>`).join('')}
                </div>
            `).join('') || '<div class="empty-state">No skills listed</div>';

            // Experience
            const experienceContainer = document.getElementById('experienceContainer');
            experienceContainer.innerHTML = experiences.map(exp => `
                <div class="experience-item">
                    <h3>${exp.title}</h3>
                    <div class="meta">${exp.company} • ${exp.duration}</div>
                    <div class="description">${exp.description}</div>
                </div>
            `).join('') || '<div class="empty-state">No experience listed</div>';

            // Projects
            const projectsContainer = document.getElementById('projectsContainer');
            projectsContainer.innerHTML = projects.map(proj => `
                <div class="project-item">
                    <h3>${proj.name}</h3>
                    <div class="description">${proj.description}</div>
                </div>
            `).join('') || '<div class="empty-state">No projects listed</div>';

            // Education
            const educationContainer = document.getElementById('educationContainer');
            educationContainer.innerHTML = education.map(edu => `
                <div class="education-item">
                    <h3>${edu.degree}</h3>
                    <div class="meta">${edu.school} • ${edu.year}</div>
                    <div class="description">${edu.field}</div>
                </div>
            `).join('') || '<div class="empty-state">No education listed</div>';
        }

        function scrollToSection(sectionId) {
            const element = document.getElementById(sectionId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Load resume when page loads
        loadResume();
    </script>

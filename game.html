<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protect My Resume - Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            height: 100vh;
            background: radial-gradient(circle at 20% 20%, #1a2238 0%, #0b1220 45%, #070b12 100%);
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            cursor: none;
        }

        .aim-ring {
            position: fixed;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 3px solid #ffeb3b;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 4;
            box-shadow: 0 0 16px #ffeb3b, 0 0 24px rgba(255, 235, 59, 0.6), inset 0 0 8px rgba(255, 235, 59, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="aimRing" class="aim-ring"></div>

    <script src="js/player.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/particle.js"></script>
    <script src="js/game.js"></script>
</body>
</html>

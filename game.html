<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Hunter - 2D Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        .game-container {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 20px;
        }

        .canvas-wrapper {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            border: 3px solid #fff;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #87CEEB, #90EE90);
            cursor: crosshair;
        }

        .ui-panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border: 2px solid #fff;
            border-radius: 10px;
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
        }

        .ui-section {
            border-bottom: 1px solid #666;
            padding-bottom: 15px;
        }

        .ui-section:last-child {
            border-bottom: none;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }

        .stat-label {
            color: #aaa;
        }

        .stat-value {
            font-weight: bold;
            color: #fff;
        }

        .floor-progress {
            width: 100%;
            height: 20px;
            background: #333;
            border: 1px solid #666;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            transition: width 0.3s ease;
        }

        .monsters-caught {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .monster-indicator {
            width: 20px;
            height: 20px;
            background: #444;
            border: 1px solid #999;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .monster-indicator.caught {
            background: #4CAF50;
            border-color: #45a049;
        }

        .info-panel {
            background: rgba(100, 200, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            margin-top: 10px;
            border-left: 3px solid #00a8ff;
        }

        .info-title {
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        button {
            padding: 10px 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .floor-clear {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .instructions {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.6;
        }

        h2 {
            margin-bottom: 10px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        h3 {
            margin-bottom: 8px;
            font-size: 14px;
            color: #ffd93d;
        }

        @media (max-width: 1024px) {
            .game-container {
                flex-direction: column;
                align-items: center;
            }

            .ui-panel {
                width: 100%;
                max-width: 800px;
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>

        <div class="ui-panel">
            <div class="ui-section">
                <h2>Dragon Hunter</h2>
                <div class="stat-row">
                    <span class="stat-label">Floor:</span>
                    <span class="stat-value" id="floorLevel">1</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Monsters Caught:</span>
                    <span class="stat-value" id="caughtCount">0 / 2</span>
                </div>
                <div class="floor-progress">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
                <div class="monsters-caught" id="monsterIndicators"></div>
            </div>

            <div class="ui-section" id="infoDisplay"></div>

            <div class="ui-section instructions">
                <h3>📋 How to Play</h3>
                <p>
                    • Use <strong>WASD</strong> or <strong>Arrow Keys</strong> to move<br>
                    • Chase down all dragons 🐉<br>
                    • Click on information points ℹ️ to learn<br>
                    • Clear all 10 floors to win!<br>
                    • Each floor has more dragons
                </p>
            </div>

            <div class="button-group">
                <button onclick="location.reload()">🔄 Restart Game</button>
                <button onclick="window.history.back()">← Back to Portfolio</button>
            </div>

            <div style="font-size: 12px; color: #888; margin-top: 10px; text-align: center;">
                Built with Canvas API & JavaScript
            </div>
        </div>
    </div>

    <script src="js/player.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/particle.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
